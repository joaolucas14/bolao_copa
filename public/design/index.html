<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Bolão Innovate — Copa do Mundo 2026</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<!-- Material Symbols -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<link rel="stylesheet" href="theme.css" />

<style>
html, body { margin: 0; padding: 0; background: #1A1815; }
body { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Canvas + screens -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="palpite.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="visao-geral"
        title="Bolão Innovate · Copa do Mundo 2026"
        subtitle="4 telas principais — desktop-first, dark mode, paleta da bandeira do Brasil"
      >
        <DCArtboard id="login" label="01 · Login" width={1280} height={800}>
          <LoginScreen />
        </DCArtboard>
        <DCArtboard id="dashboard" label="02 · Dashboard principal" width={1440} height={1340}>
          <DashboardScreen />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="palpite"
        title="Fluxo de palpite"
        subtitle="Registro do palpite → confirmação irreversível → revelação após o jogo"
      >
        <DCArtboard id="palpite-form" label="03a · Tela de palpite" width={1280} height={1080}>
          <PalpiteFormScreen />
        </DCArtboard>
        <DCArtboard id="palpite-modal" label="03b · Modal de confirmação" width={1280} height={1080}>
          <PalpiteConfirmScreen />
        </DCArtboard>
        <DCArtboard id="palpite-reveal" label="03c · Palpites revelados (após o jogo)" width={1280} height={1280}>
          <PalpiteRevealScreen />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="admin"
        title="Painel admin"
        subtitle="Cadastro de resultado, configuração de prêmio e gestão de jogos"
      >
        <DCArtboard id="admin-main" label="04 · Painel administrativo" width={1280} height={1100}>
          <AdminScreen />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
